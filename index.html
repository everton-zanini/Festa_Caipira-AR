<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>AR Festa Junina</title>
  
  <!-- Removemos o AR.js e mantemos apenas o A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
    }
    /* Estiliza o vídeo da câmera para preencher o fundo inteiro da tela */
    #camera-fundo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }
  </style>

  <script>
    // Ativa a câmera traseira do celular via JavaScript nativo
    window.addEventListener('load', function() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(function(stream) {
          const video = document.getElementById('camera-fundo');
          video.srcObject = stream;
        })
        .catch(function(erro) {
          console.error("Erro ao acessar a câmera: ", erro);
          alert("Por favor, permita o acesso à câmera para ver a mágica!");
        });
    });

    // Nosso gerador de balões permanece intacto
    AFRAME.registerComponent('gerador-de-baloes', {
      init: function () {
        const cena = this.el;
        const cores = ['#FF5733', '#F4D03F', '#48C9B0', '#AF7AC5', '#E74C3C', '#5DADE2'];
        
        for (let i = 0; i < 100; i++) {
          let balao = document.createElement('a-entity');
          
          let x = (Math.random() - 0.5) * 35; 
          let y = (Math.random() * 4) - 2.5; 
          let z = (Math.random() - 0.5) * 35;
          
          if (Math.abs(x) < 1.5 && Math.abs(z) < 1.5) { 
             z = -2 - (Math.random() * 3); 
          }

          balao.setAttribute('position', `${x} ${y} ${z}`);
          
          let corCima = cores[Math.floor(Math.random() * cores.length)];
          let corBaixo = cores[Math.floor(Math.random() * cores.length)];
          
          balao.innerHTML = `
            <a-cone radius-bottom="0.5" radius-top="0" height="0.8" position="0 0.4 0" color="${corCima}" opacity="0.9"></a-cone>
            <a-cone radius-bottom="0.5" radius-top="0" height="0.8" position="0 -0.4 0" rotation="180 0 0" color="${corBaixo}" opacity="0.9"></a-cone>
          `;

          let alturaDestino = y + 12; 
          let duracao = 8000 + Math.random() * 6000; 
          
          balao.setAttribute('animation__voar', `property: position; to: ${x} ${alturaDestino} ${z}; loop: true; dur: ${duracao}; easing: linear`);
          balao.setAttribute('animation__girar', `property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear`);

          cena.appendChild(balao);
        }
      }
    });
  </script>
</head>
<body>
  
  <!-- A tag de vídeo que transmite a câmera traseira -->
  <!-- playsinline é vital para funcionar em iPhones sem abrir o player de vídeo -->
  <video id="camera-fundo" autoplay playsinline></video>

  <!-- Cena 3D configurada para ter o fundo transparente (renderer="alpha: true") -->
  <a-scene 
    renderer="alpha: true" 
    gerador-de-baloes
    vr-mode-ui="enabled: false"
  >
    <!-- A câmera do A-Frame que usa o giroscópio do celular automaticamente -->
    <a-entity camera look-controls></a-entity>
  </a-scene>

</body>
</html>
