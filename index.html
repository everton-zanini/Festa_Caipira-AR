<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>AR Festa Junina</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
      font-family: Arial, sans-serif;
    }
    #camera-fundo {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: -1;
    }
    
    /* Estilos da nossa nova Tela Inicial */
    #tela-inicial {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: rgba(0, 0, 0, 0.85); /* Fundo escuro transparente */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999; /* Fica por cima de tudo */
      color: white;
      text-align: center;
    }
    #botao-comecar {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      background-color: #E74C3C; /* Vermelho junino */
      color: white;
      border: 3px dashed white;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
  </style>

  <script>
    // Agora o script espera o clique no botão para fazer a mágica
    window.addEventListener('load', function() {
      const botao = document.getElementById('botao-comecar');
      const telaInicial = document.getElementById('tela-inicial');
      const musica = document.getElementById('musica-fundo');

      // Garante loop continuo mesmo em navegadores com comportamento diferente
      musica.loop = true;
      musica.addEventListener('ended', function() {
        musica.currentTime = 0;
        musica.play();
      });

      botao.addEventListener('click', function() {
        // 1. Toca a música (em loop contínuo)
        musica.play();
        
        // 2. Esconde a tela inicial
        telaInicial.style.display = 'none';

        // 3. Pede permissão e liga a câmera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(function(stream) {
            const video = document.getElementById('camera-fundo');
            video.srcObject = stream;
          })
          .catch(function(erro) {
            console.error("Erro ao acessar a câmera: ", erro);
            alert("Por favor, permita o acesso à câmera para ver a mágica!");
          });
      });
    });

    // O gerador de balões continua igualzinho
    AFRAME.registerComponent('gerador-de-baloes', {
      init: function () {
        const cena = this.el;
        const cores = ['#FF5733', '#F4D03F', '#48C9B0', '#AF7AC5', '#E74C3C', '#5DADE2'];
        
        for (let i = 0; i < 100; i++) {
          let balao = document.createElement('a-entity');
          
          let x = (Math.random() - 0.5) * 35; 
          let y = (Math.random() * 4) - 2.5; 
          let z = (Math.random() - 0.5) * 35;
          
          if (Math.abs(x) < 1.5 && Math.abs(z) < 1.5) { 
             z = -2 - (Math.random() * 3); 
          }

          balao.setAttribute('position', `${x} ${y} ${z}`);
          
          let corCima = cores[Math.floor(Math.random() * cores.length)];
          let corBaixo = cores[Math.floor(Math.random() * cores.length)];
          
          balao.innerHTML = `
            <a-cone radius-bottom="0.5" radius-top="0" height="0.8" position="0 0.4 0" color="${corCima}" opacity="0.9"></a-cone>
            <a-cone radius-bottom="0.5" radius-top="0" height="0.8" position="0 -0.4 0" rotation="180 0 0" color="${corBaixo}" opacity="0.9"></a-cone>
          `;

          let alturaDestino = y + 12; 
          let duracao = 8000 + Math.random() * 6000; 
          
          balao.setAttribute('animation__voar', `property: position; to: ${x} ${alturaDestino} ${z}; loop: true; dur: ${duracao}; easing: linear`);
          balao.setAttribute('animation__girar', `property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear`);

          cena.appendChild(balao);
        }
      }
    });

    // Gerador de fogos de artificio para enriquecer o cenario
    AFRAME.registerComponent('gerador-de-fogos', {
      init: function () {
        const cena = this.el;
        const coresExplosao = ['#FFD166', '#FF6B6B', '#4ECDC4', '#F7FFF7', '#F94144', '#F9C74F'];

        const criarParticula = (origem, cor) => {
          const particula = document.createElement('a-sphere');
          const direcaoX = (Math.random() - 0.5) * 10;
          const direcaoY = (Math.random() - 0.1) * 7;
          const direcaoZ = (Math.random() - 0.5) * 10;
          const destino = `${origem.x + direcaoX} ${origem.y + direcaoY} ${origem.z + direcaoZ}`;

          particula.setAttribute('radius', 0.05 + Math.random() * 0.03);
          particula.setAttribute('position', `${origem.x} ${origem.y} ${origem.z}`);
          particula.setAttribute('color', cor);
          particula.setAttribute('opacity', '0.95');
          particula.setAttribute('animation__explodir', `property: position; to: ${destino}; dur: 1100; easing: easeOutQuad`);
          particula.setAttribute('animation__sumir', 'property: material.opacity; to: 0; dur: 1100; easing: linear');

          cena.appendChild(particula);
          setTimeout(() => particula.parentNode && particula.parentNode.removeChild(particula), 1200);
        };

        const dispararFogo = () => {
          const x = (Math.random() - 0.5) * 24;
          const z = -3 - Math.random() * 18;
          const alturaExplosao = 4 + Math.random() * 4;

          const foguete = document.createElement('a-sphere');
          foguete.setAttribute('radius', '0.06');
          foguete.setAttribute('color', '#FFFFFF');
          foguete.setAttribute('position', `${x} -2 ${z}`);
          foguete.setAttribute('animation__subir', `property: position; to: ${x} ${alturaExplosao} ${z}; dur: 1200; easing: easeOutCubic`);

          cena.appendChild(foguete);

          setTimeout(() => {
            if (foguete.parentNode) {
              foguete.parentNode.removeChild(foguete);
            }

            const corBase = coresExplosao[Math.floor(Math.random() * coresExplosao.length)];
            const totalParticulas = 42 + Math.floor(Math.random() * 24);
            for (let i = 0; i < totalParticulas; i++) {
              criarParticula({ x, y: alturaExplosao, z }, corBase);
            }

            const clarão = document.createElement('a-light');
            clarão.setAttribute('type', 'point');
            clarão.setAttribute('position', `${x} ${alturaExplosao} ${z}`);
            clarão.setAttribute('color', corBase);
            clarão.setAttribute('intensity', '2.6');
            clarão.setAttribute('distance', '12');
            clarão.setAttribute('animation', 'property: intensity; from: 2.6; to: 0; dur: 350; easing: easeOutQuad');
            cena.appendChild(clarão);

            setTimeout(() => clarão.parentNode && clarão.parentNode.removeChild(clarão), 450);
          }, 1200);
        };

        setTimeout(() => {
          dispararFogo();
          this.intervaloFogos = setInterval(() => {
            dispararFogo();
            setTimeout(dispararFogo, 260);
          }, 1200);
        }, 1000);
      },

      remove: function () {
        if (this.intervaloFogos) {
          clearInterval(this.intervaloFogos);
        }
      }
    });
  </script>
</head>
<body>
  
  <!-- Nosso tocador de música invisível -->
  <!-- A tag 'loop' faz a música voltar para o início quando acaba -->
  <audio id="musica-fundo" src="musica.mp3" loop preload="auto"></audio>

  <!-- Nossa Tela Inicial -->
  <div id="tela-inicial">
    <h1>Arraiá em AR!</h1>
    <p>Aumente o som e olhe ao redor.</p>
    <button id="botao-comecar">Entrar na Festa</button>
  </div>

  <video id="camera-fundo" autoplay playsinline></video>
  <a-scene renderer="alpha: true" gerador-de-baloes gerador-de-fogos vr-mode-ui="enabled: false">
    <a-entity light="type: ambient; color: #FFF3D6; intensity: 0.9"></a-entity>
    <a-entity light="type: directional; color: #FFFFFF; intensity: 0.75" position="-1 2 1"></a-entity>
    <a-entity camera look-controls></a-entity>
  </a-scene>

</body>
</html>
